services:
  claude:
    build:
      dockerfile: Containerfile 
      context: .
    stdin_open: true
    tty: true
    working_dir: /home/claude/workspace
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      CLAUDE_CONFIG_DIR: /home/claude/workspace/claude_config
    volumes:
      - .:/home/claude/workspace
